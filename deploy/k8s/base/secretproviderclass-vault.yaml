apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dpdp-api-secrets
  namespace: dpdp-compliance
spec:
  provider: vault
  parameters:
    roleName: dpdp-api
    objects: |
      - objectName: "db-url"
        secretPath: "kv/data/dpdp/api"
        secretKey: "database_url"
      - objectName: "worker-shared-secret"
        secretPath: "kv/data/dpdp/api"
        secretKey: "worker_shared_secret"
      - objectName: "worker-request-signing-secret"
        secretPath: "kv/data/dpdp/api"
        secretKey: "worker_request_signing_secret"
      - objectName: "admin-api-token"
        secretPath: "kv/data/dpdp/api"
        secretKey: "admin_api_token"
      - objectName: "coe-private-key"
        secretPath: "kv/data/dpdp/api"
        secretKey: "coe_private_key_pkcs8_base64"
      - objectName: "coe-public-key"
        secretPath: "kv/data/dpdp/api"
        secretKey: "coe_public_key_spki_base64"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dpdp-worker-secrets
  namespace: dpdp-compliance
spec:
  provider: vault
  parameters:
    roleName: dpdp-worker
    objects: |
      - objectName: "db-url"
        secretPath: "kv/data/dpdp/worker"
        secretKey: "database_url"
      - objectName: "worker-shared-secret"
        secretPath: "kv/data/dpdp/worker"
        secretKey: "api_worker_token"
      - objectName: "worker-request-signing-secret"
        secretPath: "kv/data/dpdp/worker"
        secretKey: "api_request_signing_secret"
      - objectName: "dpdp-master-key"
        secretPath: "kv/data/dpdp/worker"
        secretKey: "dpdp_master_key"
      - objectName: "dpdp-hmac-key"
        secretPath: "kv/data/dpdp/worker"
        secretKey: "dpdp_hmac_key"
