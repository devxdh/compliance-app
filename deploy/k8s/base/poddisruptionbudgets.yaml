apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dpdp-api
  namespace: dpdp-compliance
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dpdp-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dpdp-worker
  namespace: dpdp-compliance
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dpdp-worker
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: avantii-web
  namespace: dpdp-compliance
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: avantii-web
