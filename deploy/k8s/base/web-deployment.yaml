apiVersion: apps/v1
kind: Deployment
metadata:
  name: avantii-web
  namespace: dpdp-compliance
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: avantii-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: avantii-web
    spec:
      serviceAccountName: avantii-web
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/your-org/avantii-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: avantii-web-secrets
                  key: auth-secret
            - name: AUTH_GOOGLE_ID
              valueFrom:
                secretKeyRef:
                  name: avantii-web-secrets
                  key: google-client-id
            - name: AUTH_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: avantii-web-secrets
                  key: google-client-secret
            - name: AVANTII_ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: avantii-web-secrets
                  key: admin-email-allowlist
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: avantii-web-secrets
                  key: admin-api-token
            - name: AVANTII_API_BASE_URL
              value: http://dpdp-api.dpdp-compliance.svc.cluster.local:3000
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/web/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
