apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpdp-worker
  namespace: dpdp-compliance
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dpdp-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dpdp-worker
    spec:
      serviceAccountName: dpdp-worker
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/your-org/dpdp-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9464
          env:
            - name: METRICS_PORT
              value: "9464"
            - name: DATABASE_URL_FILE
              value: /mnt/secrets-store/db-url
            - name: API_WORKER_TOKEN_FILE
              value: /mnt/secrets-store/worker-shared-secret
            - name: API_REQUEST_SIGNING_SECRET_FILE
              value: /mnt/secrets-store/worker-request-signing-secret
            - name: DPDP_MASTER_KEY_FILE
              value: /mnt/secrets-store/dpdp-master-key
            - name: DPDP_HMAC_KEY_FILE
              value: /mnt/secrets-store/dpdp-hmac-key
            - name: MAILER_WEBHOOK_URL
              value: http://internal-mailer.dpdp-compliance.svc.cluster.local:8080/mail
          volumeMounts:
            - name: worker-config
              mountPath: /app/compliance-engine/compliance.worker.yml
              subPath: compliance.worker.yml
              readOnly: true
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      volumes:
        - name: worker-config
          configMap:
            name: dpdp-worker-config
        - name: tmp
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: dpdp-worker-secrets

