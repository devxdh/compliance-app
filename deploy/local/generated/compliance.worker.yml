version: "1.0"
database:
  app_schema: "mock_app"
  engine_schema: "dpdp_engine"

compliance_policy:
  default_retention_years: 1
  notice_window_hours: 48
  retention_rules:
    - rule_name: "PMLA_FINANCIAL"
      if_has_data_in:
        - "transactions"
        - "invoices"
      retention_years: 10
    - rule_name: "RBI_KYC"
      if_has_data_in:
        - "kyc_documents"
      retention_years: 5

graph:
  root_table: "users"
  root_id_column: "id"
  max_depth: 32
  notice_email_column: "email"
  notice_name_column: "full_name"
  root_pii_columns:
    email: "HMAC"
    full_name: "STATIC_MASK"

satellite_targets:
  - table: "marketing_leads"
    lookup_column: "email"
    action: "redact"
    masking_rules:
      email: "HMAC"
      name: "STATIC_MASK"
  - table: "system_audit_logs"
    lookup_column: "user_identifier"
    action: "hard_delete"

outbox:
  batch_size: 10
  lease_seconds: 60
  max_attempts: 10
  base_backoff_ms: 1000

security:
  notification_lease_seconds: 120
  master_key_env: "DPDP_MASTER_KEY"
  hmac_key_env: "DPDP_HMAC_KEY"

integrity:
  expected_schema_hash: "37aa679bf845e42de09332f9fc584b121e93cfade74936a76e1e6a83be2be6fd"
